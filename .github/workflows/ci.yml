name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
      # The bundled-embedder tests need the model weights; cache the 90MB
      # download so CI only pays for it when the model changes.
      - name: cache embedding model
        uses: actions/cache@v6
        with:
          path: internal/embed/bundled/model.safetensors
          key: minilm-l6-v2-safetensors
      - name: fetch embedding model
        run: ./hack/fetch-model.sh
      - name: gofmt
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./... -race

  # Cross-compilation must stay green from day one: once sqlite-vec (CGo)
  # lands, this matrix is the early-warning system for the project's
  # top-listed risk (see docs/ROADMAP.md).
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./cmd/hay

  # The marketing/docs site deploys straight from main, so a broken
  # typecheck or build must fail here rather than in the deploy. `next
  # build` runs its own TypeScript pass, which catches things `tsc`
  # alone does not.
  website:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: install
        run: npm ci
      - name: typecheck
        run: npm run types:check
      - name: build
        run: npm run build
