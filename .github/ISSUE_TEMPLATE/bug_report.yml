name: Bug report
description: Something in Haypile is not working as expected.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. A few details up front save a
        round-trip. If this is a security issue, please do not file it here;
        follow SECURITY.md instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you did, what you expected, and what actually happened.
      placeholder: |
        I ran `hay search "..."` on a folder of PDFs and ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. hay add ~/some-folder
        2. hay search "..."
        3. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Haypile version
      description: Output of `hay --version`.
      placeholder: v0.1.1
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (amd64)
        - Linux (arm64)
        - Windows
    validations:
      required: true
  - type: textarea
    id: status
    attributes:
      label: hay status output
      description: >
        Paste the output of `hay status`. This is rendered as code, so no need
        for backticks. Redact folder paths if they are sensitive.
      render: text
    validations:
      required: false
